name: Full Analysis

on: workflow_dispatch

jobs:
  supervip:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: File Info
      run: file SuperVIP && ls -la SuperVIP
    - name: All UI Strings
      run: |
        strings SuperVIP > /tmp/sv_strings.txt
        echo "=== ViewController names ==="
        grep -iE "ViewController|Controller$|TabBar|Tab.*Controller|Navigation" /tmp/sv_strings.txt | sort -u
        echo "=== Tab titles ==="
        grep -iE "主页|应用|注入|缓存|下载|我的|设置|首页|Home|App|Inject|Cache|Mine|Profile" /tmp/sv_strings.txt | sort -u
        echo "=== Button/View names ==="
        grep -iE "Button|ImageView|Label|TableView|CollectionView|ScrollView|StackView" /tmp/sv_strings.txt | sort -u | head -30
        echo "=== All ObjC class names ==="
        grep -oE '[A-Z][a-zA-Z0-9]{2,}(ViewController|Controller|View|TabBar|Tab|Manager|Model)' /tmp/sv_strings.txt | sort -u | head -40
    - uses: actions/upload-artifact@v4
      with: {name: supervip_strings, path: /tmp/sv_strings.txt}
