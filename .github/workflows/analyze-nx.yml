name: Full Analysis

on: workflow_dispatch

jobs:
  znzminipro:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: FILE INFO
      run: file znzminipro.dylib && ls -la znzminipro.dylib
    - name: ALL STRINGS
      run: strings znzminipro.dylib > /tmp/strings.txt; wc -l /tmp/strings.txt
    - uses: actions/upload-artifact@v4
      with: {name: znzminipro_strings, path: /tmp/strings.txt}

  one_dylib:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: ALL STRINGS
      run: strings one.dylib | sort -u > /tmp/one_strings.txt; wc -l /tmp/one_strings.txt
    - uses: actions/upload-artifact@v4
      with: {name: one_strings, path: /tmp/one_strings.txt}

  supervip:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Class Dump SuperVIP
      run: |
        brew install class-dump 2>/dev/null || true
        file SuperVIP
        class-dump -H SuperVIP -o /tmp/supervip/ 2>/dev/null || echo "class-dump failed, using strings"
        echo "=== All headers ==="
        find /tmp/supervip -name "*.h" 2>/dev/null | head -50
        echo "=== ViewControllers ==="
        find /tmp/supervip -name "*.h" 2>/dev/null | xargs -I{} basename {} | grep -iE "view|controller|home|main|tab|root|app|list|store|login|mine|profile|download" | sort
        echo "=== All strings (UI related) ==="
        strings SuperVIP | grep -iE "ViewController|Controller|View|Tab|Home|Main|Store|AppList|Download|Login|Mine|Profile|Settings|Web|Browser" | sort -u | head -50
    - uses: actions/upload-artifact@v4
      with: {name: supervip_headers, path: /tmp/supervip}
